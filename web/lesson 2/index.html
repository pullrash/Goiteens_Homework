<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор добутку</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 50px;
            background-color: #f4f4f9;
        }
        .calculator {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 300px;
        }
        input, button {
            display: block;
            width: 100%;
            margin-bottom: 12px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        p {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="number" id="num1" placeholder="Введіть перше число">
    <input type="number" id="num2" placeholder="Введіть друге число">
    <button id="calcButton">Обчислити добуток</button>
    <p id="result">Результат: </p>
</div>

<script>
    const multiply = (a, b) => a * b;

    document.getElementById("calcButton").addEventListener("click", () => {
        const val1 = parseFloat(document.getElementById("num1").value);
        const val2 = parseFloat(document.getElementById("num2").value);

        if (isNaN(val1) || !isNaN(val2) === false) {
            document.getElementById("result").textContent = "Будь ласка, введіть обидва числа!";
            return;
        }

        const product = multiply(val1, val2);

        document.getElementById("result").textContent = `Результат: ${product}`;
    });
</script>

</body>
</html>
