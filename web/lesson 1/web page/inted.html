<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Cats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/style.css">
</head>
<body>
    <header> 
        <div class="logo">
            <img src="src/images/logo.svg" alt="Cute Cats Logo"> 
        </div>
        <div class="text">
            Cute cats: a site where you can relax
        </div>
        <div class="end-logo">
            <img src="src/images/paw.svg" alt="Cat paw icon">
        </div>
    </header>
    
    <main>
        <section class="images">
            <div class="img">
                <img src="src/images/img_1.jpg" alt="Fluffy cute cat">
            </div>
            <div class="img">
                <img src="src/images/img_2.jpg" alt="Playful kitten">
            </div>
            <div class="img">
                <img src="src/images/img_3.jpg" alt="Funny cat eyes">
            </div>
            <div class="img">
                <img src="src/images/img_4.jpg" alt="Cat sleeping sweet">
            </div>
            <div class="img">
                <img src="src/images/img_5.jpg" alt="Cute ginger cat">
            </div>
            <div class="img">
                <img src="src/images/img_6.jpg" alt="Cat stretching">
            </div>
        </section>
    </main>
    
    <footer>
    </footer>
</body>
</html>
