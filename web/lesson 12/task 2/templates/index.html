<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Популярні Фільми</title>
</head>
<body>
    <h1>Популярні фільми</h1>
    <ul>
        {% for id, movie in movies.items() %}
            <li><a href="{{ url_for('movie_detail', movie_id=id) }}">{{ movie.title }}</a></li>
        {% endfor %}
    </ul>
    <br>
    <a href="{{ url_for('random_movie') }}"><button style="padding: 10px;">Випадковий фільм</button></a>
</body>
</html>
