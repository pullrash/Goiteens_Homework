<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація на вебінар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Реєстрація на онлайн-лекцію</h2>
                
                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <form action="{{ url_for('event_register') }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Ваше ім'я</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ name }}">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Електронна пошта (Email)</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ email }}">
                    </div>
                    <div class="mb-3">
                        <label for="time" class="form-label">Бажаний час участі</label>
                        <select class="form-select" id="time" name="time">
                            <option value="Ранок" {% if time == 'Ранок' %}selected{% endif %}>Ранок</option>
                            <option value="День" {% if time == 'День' %}selected{% endif %}>День</option>
                            <option value="Вечір" {% if time == 'Вечір' %}selected{% endif %}>Вечір</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('participants') }}" class="text-secondary">Переглянути список учасників</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
