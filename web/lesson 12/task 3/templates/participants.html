<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список учасників</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Зареєстровані учасники</h2>
                
                {% if not participants %}
                    <p class="text-muted text-center">Наразі немає жодного зареєстрованого учасника.</p>
                {% else %}
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Ім'я</th>
                                <th>Email</th>
                                <th>Час</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in participants %}
                                <tr>
                                    <td>{{ p.name }}</td>
                                    <td>{{ p.email }}</td>
                                    <td><span class="badge bg-info text-dark">{{ p.time }}</span></td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                {% endif %}
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('event_register') }}" class="btn btn-outline-primary">Додати ще одного учасника</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
