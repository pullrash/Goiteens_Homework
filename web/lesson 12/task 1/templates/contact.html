<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Зв'язок</title>
</head>
<body>
    <nav style="margin-bottom: 20px; padding: 10px; background-color: #f0f0f0;">
        <a href="{{ url_for('home') }}"><button>Головна</button></a>
        <a href="{{ url_for('countries') }}"><button>Країни</button></a>
        <a href="{{ url_for('contact') }}"><button>Контакти</button></a>
    </nav>

    <h1>Зв'язок з туристичним агентом</h1>
    <p>Заповніть форму, і наш агент зв'яжеться з вами найближчим часом.</p>
    
    <form action="{{ url_for('contact') }}" method="GET">
        <label>Ваше ім'я: <input type="text" name="name"></label><br><br>
        <label>Повідомлення: <textarea name="message"></textarea></label><br><br>
        <button type="button" onclick="alert('Повідомлення «надіслано» (це демо)!')">Надіслати</button>
    </form>
    <br>
    <a href="{{ url_for('home') }}"><button>Назад на головну</button></a>
</body>
</html>
